# kind cluster for cpvpa in-place resize e2e.
#
# Topology is intentionally fixed: kind cannot add nodes to a running
# cluster (kind#452, kind#3205), so we never scale nodes during a test.
# Resizes are driven by the cpvpa scaling config (base value), not by
# changing cluster size.
#
# The single worker has a chunk of system-reserved so its allocatable is
# small and predictable — this is what lets us force a reliable
# "Infeasible" by requesting more CPU than the node can ever grant.
#
# InPlacePodVerticalScaling is on by default on >=1.33, so no featureGates
# block is required. ubuntu-latest GitHub runners are cgroup v2, which the
# feature requires.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            system-reserved: "cpu=500m,memory=512Mi"
            # Keep eviction from interfering with deliberately tight nodes.
            eviction-hard: "memory.available<100Mi,nodefs.available<5%"
